services:
  backend:
    build:
      context: ./medico/backend
      dockerfile: Dockerfile
    ports:
      - "8888:8000"
    env_file:
      - .env
    restart: always

  frontend:
    build:
      context: ./medico/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: always
